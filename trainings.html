<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRAININGS | REBA RWANDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent-color: #eab308; }
        body { background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        
        /* 16:9 Aspect Ratio for Drills */
        .video-wrapper { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            overflow: hidden; 
            border-radius: 1.5rem; 
            background: #000; 
        }
        .video-wrapper iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
            pointer-events: none; 
        }

        /* Video Popup Overlay */
        #videoOverlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(15, 23, 42, 0.96); 
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(12px); 
        }
        .expanded-video { 
            width: 90%; 
            max-width: 1000px; 
            aspect-ratio: 16/9; 
            border: 2px solid var(--accent-color); 
            border-radius: 2rem; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .theme-accent-bg { background-color: var(--accent-color); }
        .theme-accent-border { border-color: var(--accent-color); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div id="videoOverlay" onclick="closeVideo()">
        <button class="absolute top-8 right-8 text-white text-5xl font-thin hover:text-yellow-500 transition-colors">&times;</button>
        <div class="expanded-video" onclick="event.stopPropagation()">
            <iframe id="expandedIframe" class="w-full h-full" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <header id="mainHeader" class="bg-blue-900 border-b-4 border-yellow-500 sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="https://rebarwandapl.vercel.app/icon.jpeg" class="h-10 w-10 rounded-full border-2 theme-accent-border">
                <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">Reba Rwanda</h1>
            </a>
            <div class="flex items-center space-x-3">
                <p id="displayUserName" class="text-white font-black text-xs uppercase tracking-widest">Nestor</p>
                <div id="userInitials" class="h-8 w-8 theme-accent-bg rounded-full flex items-center justify-center text-blue-900 font-bold">N</div>
            </div>
        </div>
    </header>

    <div class="flex flex-1 container mx-auto">
        <aside class="w-64 p-6 border-r border-slate-800 space-y-2 hidden lg:block">
            <nav class="sticky top-24 space-y-1">
                <a href="index.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all font-medium">🏠 Home</a>
                <a href="livefeed.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all font-medium">🔴 Live Feed</a>
                <a href="highlights.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all font-medium">🏆 Highlights</a>
                <a href="trainings.html" class="block p-3 theme-accent-bg text-blue-900 font-bold rounded-xl shadow-lg">⚽ Trainings</a>
                <a href="shorts.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all font-medium">📱 Shorts</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <header class="mb-10">
                <h2 class="text-3xl font-black uppercase italic tracking-tighter">Skill <span class="text-yellow-500">Trainings</span></h2>
                <p class="text-slate-500 text-xs font-black uppercase tracking-widest mt-1">Master your game with professional drills</p>
            </header>

            <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="col-span-full py-20 text-center opacity-20">
                    <p class="italic tracking-widest uppercase text-xs font-black">Accessing training database...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Supabase Initialization
        const supabaseUrl = 'https://cukkytzxcrgyiyciisle.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1a2t5dHp4Y3JneWl5Y2lpc2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTU1OTgsImV4cCI6MjA5MTU3MTU5OH0.5xT_ul_eHMHbbRNQKSAcHoTF2zLMrqgc1GXHYOZhD1c';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function fetchTrainings() {
            const { data: videos, error } = await _supabase
                .from('site_videos')
                .select('*')
                .eq('category', 'trainings') // Specifically fetch training category
                .order('created_at', { ascending: false });

            const grid = document.getElementById('videoGrid');

            if (error) {
                grid.innerHTML = `<p class="text-red-500 text-center col-span-full font-bold">Failed to load training sessions.</p>`;
                return;
            }

            if (videos && videos.length > 0) {
                grid.innerHTML = videos.map(v => `
                    <div class="bg-slate-800/40 p-5 rounded-[2.5rem] border border-slate-700 cursor-pointer hover:border-yellow-500 transition-all hover:scale-[1.02] group" onclick="openVideo('${v.url}')">
                        <div class="video-wrapper mb-4 border border-slate-700">
                            <iframe src="${v.url}"></iframe>
                        </div>
                        <div class="px-2">
                            <span class="text-[8px] bg-yellow-500/10 text-yellow-500 px-2 py-1 rounded-md uppercase font-black tracking-widest mb-2 inline-block border border-yellow-500/20">Drill Video</span>
                            <h4 class="font-bold text-sm leading-tight group-hover:text-yellow-500 transition-colors uppercase tracking-tight">${v.title}</h4>
                            <div class="mt-4 flex justify-between items-center opacity-40">
                                <span class="text-[9px] font-black uppercase">Football</span>
                                <span class="text-[9px] font-black uppercase">Beginner+</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center bg-slate-900/30 rounded-[3rem] border border-dashed border-slate-800">
                        <p class="text-slate-600 font-black uppercase text-xs tracking-widest">No Training Drills Posted Yet</p>
                    </div>
                `;
            }
        }

        function openVideo(url) {
            document.getElementById('expandedIframe').src = url + "?autoplay=1&rel=0";
            document.getElementById('videoOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden'; 
        }

        function closeVideo() {
            document.getElementById('expandedIframe').src = "";
            document.getElementById('videoOverlay').style.display = 'none';
            document.body.style.overflow = 'auto'; 
        }

        window.onload = function() {
            fetchTrainings();
            const name = localStorage.getItem('userName') || 'Nestor';
            const color = localStorage.getItem('themeColor') || '#eab308';
            
            document.getElementById('displayUserName').innerText = name;
            document.getElementById('userInitials').innerText = name.charAt(0).toUpperCase();
            document.documentElement.style.setProperty('--accent-color', color);
            document.getElementById('mainHeader').style.borderColor = color;
            
            document.querySelectorAll('.theme-accent-bg').forEach(el => el.style.backgroundColor = color);
            document.querySelectorAll('.theme-accent-border').forEach(el => el.style.borderColor = color);
        };
    </script>
</body>
</html>
