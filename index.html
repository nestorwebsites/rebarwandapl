<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBA RWANDA | HOME</title>
    <link rel="icon" type="image/jpeg" href="https://rebarwandapl.vercel.app/icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent-color: #eab308; }
        body { background-color: #0f172a; color: #f8fafc; }
        .theme-accent-bg { background-color: var(--accent-color); }
        .theme-accent-text { color: var(--accent-color); }
        .theme-accent-border { border-color: var(--accent-color); }
    </style>
</head>
<body class="font-sans flex flex-col min-h-screen">
    <header id="mainHeader" class="bg-blue-900 border-b-4 border-yellow-500 sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="https://rebarwandapl.vercel.app/icon.jpeg" class="h-10 w-10 rounded-full border-2 theme-accent-border">
                <h1 class="text-lg font-black text-white italic">REBA RWANDA</h1>
            </a>
            <div class="flex items-center space-x-4">
                <p id="displayUserName" class="text-white font-black text-xs uppercase">Nestor</p>
                <div id="userInitials" class="h-8 w-8 theme-accent-bg rounded-full flex items-center justify-center text-blue-900 font-bold">N</div>
            </div>
        </div>
    </header>

    <div class="flex flex-1 container mx-auto">
        <aside class="w-64 p-6 border-r border-slate-800 space-y-4 hidden lg:block">
            <nav class="space-y-1">
                <a href="index.html" class="flex items-center space-x-3 p-3 theme-accent-bg text-black rounded-xl font-bold"><span>🏠</span> <span>Home</span></a>
                <a href="livefeed.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all"><span>🔴</span> <span>Live Feed</span></a>
                <a href="highlights.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all"><span>🏆</span> <span>Highlights</span></a>
                <a href="trainings.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all"><span>⚽</span> <span>Trainings</span></a>
                <a href="shorts.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all"><span>📱</span> <span>Shorts</span></a>
                <a href="settings.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all"><span>⚙️</span> <span>Settings</span></a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <h2 class="text-3xl font-black mb-6 uppercase italic">Welcome Back</h2>
            <div class="bg-slate-800/50 p-10 rounded-3xl border border-slate-700 text-center">
                <p class="text-slate-400">Select a category from the menu to start watching live sports content from Rwanda.</p>
            </div>
        </main>
    </div>

    <script>
        window.onload = function() {
            const name = localStorage.getItem('userName') || 'Nestor';
            const color = localStorage.getItem('themeColor') || '#eab308';
            document.getElementById('displayUserName').innerText = name;
            document.getElementById('userInitials').innerText = name.charAt(0).toUpperCase();
            document.getElementById('mainHeader').style.borderColor = color;
            document.documentElement.style.setProperty('--accent-color', color);
            document.querySelectorAll('.theme-accent-bg').forEach(el => el.style.backgroundColor = color);
            document.querySelectorAll('.theme-accent-border').forEach(el => el.style.borderColor = color);
        };
    </script>
</body>
</html>
