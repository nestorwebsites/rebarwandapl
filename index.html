<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBA RWANDA PREMIER LEAGUE LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .video-box {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background-color: #000;
        }
        .video-box iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }
        /* Custom scrollbar for the match list */
        .match-list::-webkit-scrollbar { width: 6px; }
        .match-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="font-sans">

    <nav class="bg-blue-900 border-b-4 border-yellow-500 p-4 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-white italic tracking-tighter">
                REBA RWANDA <span class="text-yellow-400">LIVE</span>
            </h1>
            <div class="text-right">
                <span class="block text-[10px] uppercase text-blue-300 font-bold">Project Lead</span>
                <span class="text-white font-black tracking-widest text-lg">NESTOR</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-6 px-4">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="lg:col-span-3">
                <div class="bg-slate-800 rounded-2xl overflow-hidden shadow-2xl border border-slate-700">
                    <div class="video-box">
                        <iframe 
                            name="nestorPlayer" 
                            src="https://www.youtube.com/embed/xIHNb-KWiPw?rel=0" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    <div class="p-6">
                        <h2 class="text-2xl font-bold">Main Match Feed</h2>
                        <p class="text-slate-400 mt-1">Select a match from the sidebar to update this screen.</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-slate-800 rounded-2xl p-4 border border-slate-700 h-full">
                    <h3 class="text-yellow-500 font-black text-xs uppercase mb-4 flex items-center">
                        <span class="w-2 h-2 bg-red-600 rounded-full mr-2 animate-pulse"></span>
                        Upcoming & Recent
                    </h3>
                    
                    <div class="space-y-3 match-list overflow-y-auto max-h-[500px] pr-2">
                        
                        <a href="https://www.youtube.com/embed/xIHNb-KWiPw?autoplay=1" target="nestorPlayer" 
                           class="block bg-slate-900 p-3 rounded-lg border-l-4 border-blue-600 hover:bg-slate-700 transition">
                            <p class="text-[10px] text-slate-500 font-bold uppercase">FIFA Series</p>
                            <p class="text-sm font-bold">Rwanda vs Grenada</p>
                        </a>

                        <a href="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1" target="nestorPlayer" 
                           class="block bg-slate-900 p-3 rounded-lg border-l-4 border-transparent hover:border-yellow-500 hover:bg-slate-700 transition">
                            <p class="text-[10px] text-slate-500 font-bold uppercase">RPL MD 24</p>
                            <p class="text-sm font-bold">Rayon Sports Preview</p>
                        </a>

                        </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="mt-12 py-10 text-center border-t border-slate-800">
        <p class="text-slate-500 text-sm italic">Engineered for the fans by <span class="text-yellow-500 font-bold">Nestor</span></p>
    </footer>

</body>
</html>
