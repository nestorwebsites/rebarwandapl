<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REBA RWANDA PREMIER LEAGUE LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        /* This container forces the video to stay in a 16:9 ratio in its space */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 ratio */
            height: 0;
            overflow: hidden;
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="font-sans">

    <nav class="bg-blue-800 border-b-4 border-yellow-500 p-4 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-white italic">
                REBA RWANDA <span class="text-yellow-400">LIVE</span>
            </h1>
            <div class="text-right">
                <p class="text-[10px] uppercase text-blue-200">System Built by</p>
                <p class="text-yellow-400 font-black">NESTOR</p>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-6 px-4">
        <div class="max-w-4xl mx-auto bg-slate-800 rounded-2xl shadow-2xl overflow-hidden border border-slate-700">
            
            <div class="p-3 bg-slate-900 flex justify-between items-center px-6">
                <div class="flex items-center space-x-2">
                    <span class="w-3 h-3 bg-red-600 rounded-full animate-ping"></span>
                    <span class="text-xs font-bold uppercase tracking-widest text-red-500">Video Feed Active</span>
                </div>
                <span class="text-[10px] text-slate-500 font-mono">ID: xIHNb-KWiPw</span>
            </div>

            <div class="video-wrapper bg-black">
                <iframe 
                    src="https://www.youtube.com/embed/xIHNb-KWiPw?rel=0&modestbranding=1&showinfo=0" 
                    title="Rwanda Premier League Highlights" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>

            <div class="p-6">
                <h2 class="text-xl font-bold text-white uppercase tracking-tight">
                    Rwanda vs Grenada | FIFA Series Highlights
                </h2>
                <p class="text-slate-400 text-sm mt-2">
                    Streaming live data and highlights for the Rwanda Premier League. 
                    Developed by <span class="text-yellow-500 font-bold">Nestor</span>.
                </p>
            </div>
        </div>
    </main>

    <footer class="mt-10 text-center text-slate-600 text-xs pb-10">
        &copy; 2026 REBA RWANDA | Engineering by Nestor
    </footer>

</body>
</html>
