<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHORTS | REBA RWANDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent-color: #eab308; }
        body { background-color: #0f172a; color: #f8fafc; }
        
        /* Specialized Vertical Ratio for Shorts (9:16) */
        .short-wrapper { 
            position: relative; 
            padding-bottom: 177.77%; /* 9:16 Aspect Ratio */
            height: 0; 
            overflow: hidden; 
            border-radius: 1.5rem; 
            background: #000; 
        }
        .short-wrapper iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
            pointer-events: none; /* Prevents clicking inside small cards */
        }

        /* Full Screen Overlay for Shorts */
        #videoOverlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.95); 
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(10px); 
        }
        .expanded-short { 
            height: 85vh; 
            aspect-ratio: 9/16; 
            border: 2px solid var(--accent-color); 
            border-radius: 2rem; 
            overflow: hidden; 
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .theme-accent-bg { background-color: var(--accent-color); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div id="videoOverlay" onclick="closeVideo()">
        <button class="absolute top-6 right-6 text-white text-4xl font-light hover:text-yellow-500">&times;</button>
        <div class="expanded-short" onclick="event.stopPropagation()">
            <iframe id="expandedIframe" class="w-full h-full" allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

    <header id="mainHeader" class="bg-blue-900 border-b-4 border-yellow-500 sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="https://rebarwandapl.vercel.app/icon.jpeg" class="h-10 w-10 rounded-full border-2 border-yellow-500">
                <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">Reba Rwanda</h1>
            </a>
            <div id="userInitials" class="h-8 w-8 theme-accent-bg rounded-full flex items-center justify-center text-blue-900 font-bold">N</div>
        </div>
    </header>

    <div class="flex flex-1 container mx-auto">
        <aside class="w-64 p-6 border-r border-slate-800 space-y-2 hidden lg:block">
            <nav class="sticky top-24">
                <a href="index.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all">🏠 Home</a>
                <a href="livefeed.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all">🔴 Live Feed</a>
                <a href="highlights.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all">🏆 Highlights</a>
                <a href="trainings.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all">⚽ Trainings</a>
                <a href="shorts.html" class="block p-3 theme-accent-bg text-blue-900 font-bold rounded-xl">📱 Shorts</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-3xl font-black uppercase italic tracking-tighter">Shorts</h2>
                <span class="text-[10px] font-black theme-accent-bg text-blue-900 px-3 py-1 rounded-full uppercase">Trending</span>
            </div>

            <div id="shortsGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                </div>
        </main>
    </div>

    <script>
        // Supabase Config
        const _supabase = supabase.createClient('https://cukkytzxcrgyiyciisle.supabase.co', 'sb_publishable_z9QuZbH-vdV6CATzC7vLLQ_GlafP1yd');
        
        async function fetchShorts() {
            const { data: videos } = await _supabase
                .from('site_videos')
                .select('*')
                .eq('category', 'shorts')
                .order('created_at', { ascending: false });

            const grid = document.getElementById('shortsGrid');
            
            if(videos && videos.length > 0) {
                grid.innerHTML = videos.map(v => `
                    <div class="bg-slate-800/40 p-2 rounded-[2rem] border border-slate-700 cursor-pointer hover:border-yellow-500 transition-all hover:scale-[1.02]" onclick="openVideo('${v.url}')">
                        <div class="short-wrapper mb-3">
                            <iframe src="${v.url}"></iframe>
                        </div>
                        <div class="px-2 pb-2">
                            <h4 class="font-bold text-xs truncate uppercase tracking-tight">${v.title}</h4>
                        </div>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = `<p class="text-slate-600 italic col-span-full text-center py-20 uppercase font-bold tracking-widest opacity-50">No Shorts Yet</p>`;
            }
        }

        function openVideo(url) {
            // Force autoplay and remove related videos
            document.getElementById('expandedIframe').src = url + "?autoplay=1&rel=0&controls=1";
            document.getElementById('videoOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            document.getElementById('expandedIframe').src = "";
            document.getElementById('videoOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = function() {
            fetchShorts();
            
            // Apply User Theme
            const color = localStorage.getItem('themeColor') || '#eab308';
            const name = localStorage.getItem('userName') || 'Nestor';
            
            document.documentElement.style.setProperty('--accent-color', color);
            document.getElementById('mainHeader').style.borderColor = color;
            document.getElementById('userInitials').innerText = name.charAt(0).toUpperCase();
            document.querySelectorAll('.theme-accent-bg').forEach(el => el.style.backgroundColor = color);
        };
    </script>
</body>
</html>
