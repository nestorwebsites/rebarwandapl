<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SETTINGS | REBA RWANDA</title>
    <link rel="icon" type="image/jpeg" href="https://rebarwandapl.vercel.app/icon.jpeg">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-color: #eab308; }
        body { background-color: #0f172a; color: #f8fafc; }
        
        .theme-accent-bg { background-color: var(--accent-color); }
        .theme-accent-border { border-color: var(--accent-color); }
        .theme-accent-text { color: var(--accent-color); }

        .settings-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }
    </style>
</head>
<body class="font-sans flex flex-col min-h-screen">

    <header id="mainHeader" class="bg-blue-900 border-b-4 border-yellow-500 sticky top-0 z-50 shadow-2xl">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-4">
                <img src="https://rebarwandapl.vercel.app/icon.jpeg" alt="Logo" class="h-12 w-12 rounded-full border-2 border-yellow-400 object-cover theme-accent-border">
                <h1 class="text-xl font-black text-white italic">REBA RWANDA</h1>
            </a>
            <div class="flex items-center space-x-4">
                <p id="displayUserName" class="text-white font-black text-sm uppercase">Nestor</p>
                <div id="userInitials" class="h-10 w-10 bg-yellow-500 rounded-full flex items-center justify-center text-blue-900 font-bold theme-accent-bg">N</div>
            </div>
        </div>
    </header>

    <div class="flex flex-1 container mx-auto">
        <aside class="hidden lg:block w-64 p-6 border-r border-slate-800 space-y-4">
            <nav class="space-y-2">
                <a href="index.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all"><span>🏠</span> <span>Home</span></a>
                <a href="livefeed.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all"><span>🔴</span> <span>Live Feed</span></a>
                <a href="highlights.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all"><span>🏆</span> <span>Highlights</span></a>
                <a href="trainings.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all"><span>⚽</span> <span>Trainings</span></a>
                <a href="shorts.html" class="flex items-center space-x-3 p-3 hover:bg-slate-800 rounded-xl transition-all"><span>📱</span> <span>Shorts</span></a>
                <a href="settings.html" class="flex items-center space-x-3 p-3 bg-yellow-500 text-black rounded-xl font-bold theme-accent-bg"><span>⚙️</span> <span>Settings</span></a>
            </nav>
        </aside>

        <main class="flex-1 p-8 flex justify-center items-start">
            <div class="settings-card w-full max-w-lg p-8 space-y-8">
                <h2 class="text-3xl font-black uppercase italic tracking-tighter theme-accent-text">Configuration</h2>
                
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-500 mb-2">Display Name</label>
                        <input type="text" id="nameInput" placeholder="Enter name..." 
                               class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-yellow-500 transition-all">
                    </div>

                    <div>
                        <label class="block text-xs font-black uppercase text-slate-500 mb-2">Accent Theme Color</label>
                        <input type="color" id="colorInput" value="#eab308"
                               class="w-full h-12 bg-transparent cursor-pointer rounded-lg">
                    </div>

                    <button onclick="saveSettings()" class="w-full theme-accent-bg text-blue-900 font-black py-4 rounded-xl hover:opacity-90 transition-all uppercase tracking-widest">
                        Apply Changes
                    </button>
                    
                    <button onclick="resetSettings()" class="w-full text-slate-500 text-xs font-bold hover:text-white transition-all">
                        Reset to Defaults
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Save to LocalStorage
        function saveSettings() {
            const name = document.getElementById('nameInput').value;
            const color = document.getElementById('colorInput').value;

            if(name.trim() !== "") {
                localStorage.setItem('userName', name);
            }
            localStorage.setItem('themeColor', color);

            // Apply immediately to current page
            applyLiveSettings();
            alert("Settings updated successfully!");
        }

        function resetSettings() {
            localStorage.removeItem('userName');
            localStorage.removeItem('themeColor');
            location.reload();
        }

        function applyLiveSettings() {
            const name = localStorage.getItem('userName') || 'Nestor';
            const color = localStorage.getItem('themeColor') || '#eab308';

            // Update UI elements
            document.getElementById('displayUserName').innerText = name;
            document.getElementById('userInitials').innerText = name.charAt(0).toUpperCase();
            document.getElementById('mainHeader').style.borderColor = color;
            
            // Update Accent styles
            document.documentElement.style.setProperty('--accent-color', color);
            document.querySelectorAll('.theme-accent-bg').forEach(el => el.style.backgroundColor = color);
            document.querySelectorAll('.theme-accent-text').forEach(el => el.style.color = color);
            document.querySelectorAll('.theme-accent-border').forEach(el => el.style.borderColor = color);
        }

        // Load settings when page opens
        window.onload = function() {
            applyLiveSettings();
            // Pre-fill inputs with current values
            document.getElementById('nameInput').value = localStorage.getItem('userName') || '';
            document.getElementById('colorInput').value = localStorage.getItem('themeColor') || '#eab308';
        };
    </script>
</body>
</html>
