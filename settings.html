<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SETTINGS | REBA RWANDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent-color: #eab308; }
        body { background-color: #0f172a; color: #f8fafc; }
        .settings-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 2.5rem; }
        .color-dot { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; transition: transform 0.2s, border 0.2s; border: 3px solid transparent; }
        .color-dot:hover { transform: scale(1.1); }
        .color-dot.active { border-color: white; transform: scale(1.1); }
        .theme-accent-bg { background-color: var(--accent-color); }
    </style>
</head>
<body class="font-sans flex flex-col min-h-screen">

    <header id="mainHeader" class="bg-blue-900 border-b-4 border-yellow-500 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="https://rebarwandapl.vercel.app/icon.jpeg" class="h-10 w-10 rounded-full border-2 border-yellow-500">
                <h1 class="text-xl font-black italic text-white uppercase tracking-tighter">REBA RWANDA</h1>
            </a>
            <div id="userInitials" class="h-10 w-10 theme-accent-bg rounded-full flex items-center justify-center text-blue-900 font-black text-lg">N</div>
        </div>
    </header>

    <div class="flex flex-1 container mx-auto">
        <aside class="w-64 p-6 border-r border-slate-800 space-y-2 hidden lg:block">
            <nav class="space-y-1">
                <a href="index.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all">🏠 Home</a>
                <a href="livefeed.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all">🔴 Live Feed</a>
                <a href="highlights.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all">🏆 Highlights</a>
                <a href="trainings.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all">⚽ Trainings</a>
                <a href="shorts.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all">📱 Shorts</a>
                <a href="settings.html" class="block p-3 theme-accent-bg text-blue-900 font-bold rounded-xl">⚙️ Settings</a>
            </nav>
        </aside>

        <main class="flex-1 p-8 max-w-2xl">
            <h2 class="text-3xl font-black mb-8 uppercase italic tracking-tighter">Preferences</h2>

            <div class="settings-card p-8 space-y-10">
                <section>
                    <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest mb-4">Display Profile</h3>
                    <div class="space-y-4">
                        <label class="block text-sm font-bold">Your Name</label>
                        <input type="text" id="nameInput" placeholder="Enter your name" 
                            class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl focus:outline-none focus:ring-2 focus:ring-yellow-500 transition-all">
                    </div>
                </section>

                <section>
                    <h3 class="text-xs font-black uppercase text-slate-500 tracking-widest mb-4">Interface Theme</h3>
                    <p class="text-sm font-bold mb-4">Choose Accent Color</p>
                    <div class="flex flex-wrap gap-4">
                        <div class="color-dot bg-yellow-500" data-color="#eab308"></div>
                        <div class="color-dot bg-blue-500" data-color="#3b82f6"></div>
                        <div class="color-dot bg-red-600" data-color="#dc2626"></div>
                        <div class="color-dot bg-green-500" data-color="#22c55e"></div>
                        <div class="color-dot bg-purple-500" data-color="#a855f7"></div>
                        <div class="color-dot bg-orange-500" data-color="#f97316"></div>
                    </div>
                </section>

                <div class="pt-6">
                    <button onclick="saveSettings()" class="w-full theme-accent-bg text-blue-900 font-black py-4 rounded-2xl uppercase tracking-widest hover:scale-[1.02] active:scale-95 transition-all">
                        Save Preferences
                    </button>
                    <p id="saveMsg" class="text-center text-[10px] font-bold text-green-500 mt-4 opacity-0 uppercase tracking-widest transition-opacity">Settings Applied Successfully</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        let selectedColor = localStorage.getItem('themeColor') || '#eab308';

        // Initialize UI
        window.onload = function() {
            const savedName = localStorage.getItem('userName') || 'Nestor';
            document.getElementById('nameInput').value = savedName;
            document.getElementById('userInitials').innerText = savedName.charAt(0).toUpperCase();
            
            updateThemeUI(selectedColor);

            // Setup Color Dots
            const dots = document.querySelectorAll('.color-dot');
            dots.forEach(dot => {
                if(dot.dataset.color === selectedColor) dot.classList.add('active');
                
                dot.onclick = () => {
                    dots.forEach(d => d.classList.remove('active'));
                    dot.classList.add('active');
                    selectedColor = dot.dataset.color;
                };
            });
        };

        function updateThemeUI(color) {
            document.documentElement.style.setProperty('--accent-color', color);
            document.getElementById('mainHeader').style.borderColor = color;
            document.getElementById('userInitials').style.backgroundColor = color;
            document.querySelectorAll('.theme-accent-bg').forEach(el => el.style.backgroundColor = color);
        }

        function saveSettings() {
            const name = document.getElementById('nameInput').value.trim() || 'Nestor';
            
            // Save to Storage
            localStorage.setItem('userName', name);
            localStorage.setItem('themeColor', selectedColor);

            // Update Header Initials immediately
            document.getElementById('userInitials').innerText = name.charAt(0).toUpperCase();
            updateThemeUI(selectedColor);

            // Success Message
            const msg = document.getElementById('saveMsg');
            msg.style.opacity = '1';
            setTimeout(() => msg.style.opacity = '0', 3000);
        }
    </script>
</body>
</html>
