<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | REBA RWANDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent-color: #eab308; }
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .admin-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .input-field { background-color: #0f172a; border: 1px solid #334155; padding: 0.75rem 1rem; border-radius: 1rem; width: 100%; transition: all 0.2s; }
        .input-field:focus { border-color: var(--accent-color); outline: none; box-shadow: 0 0 0 2px rgba(234, 179, 8, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter uppercase">ADMIN <span class="text-yellow-500">DASHBOARD</span></h1>
                <p class="text-xs text-slate-500 font-bold uppercase tracking-widest mt-1">Live Cloud Controller</p>
            </div>
            <div class="flex space-x-3">
                <a href="index.html" class="bg-slate-800 px-6 py-2 rounded-full text-[10px] font-black hover:bg-slate-700 uppercase transition-all">View Website</a>
                <button onclick="location.reload()" class="bg-slate-700 px-4 py-2 rounded-full text-[10px] font-black hover:bg-slate-600 uppercase">Sync</button>
            </div>
        </div>

        <div class="admin-card p-6 md:p-8 mb-8 border-l-4 border-yellow-500">
            <h2 class="text-sm font-black uppercase mb-6 text-yellow-500 italic">Publish New Content</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-500 mb-2 ml-1">Video Title</label>
                    <input type="text" id="vTitle" placeholder="Match Highlights: Rayon Sports vs APR" class="input-field">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-500 mb-2 ml-1">YouTube URL</label>
                    <input type="text" id="vUrl" placeholder="https://youtube.com/watch?v=..." class="input-field">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-500 mb-2 ml-1">Page Category</label>
                    <select id="vCat" class="input-field text-slate-300">
                        <option value="livefeed">🔴 Live Feed</option>
                        <option value="highlights">🏆 Highlights</option>
                        <option value="trainings">⚽ Trainings</option>
                        <option value="shorts">📱 Shorts</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button onclick="saveToCloud()" id="saveBtn" class="w-full bg-yellow-500 text-blue-900 font-black h-[46px] rounded-xl uppercase text-xs hover:bg-yellow-400 hover:scale-[1.02] active:scale-95 transition-all">
                        Publish to Site
                    </button>
                </div>
            </div>
        </div>

        <div class="admin-card p-6 md:p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-sm font-black uppercase text-slate-400">Current Cloud Database</h2>
                <span id="totalCount" class="text-[10px] font-bold bg-slate-800 px-2 py-1 rounded-md text-slate-500">0 Videos</span>
            </div>
            
            <div id="videoList" class="space-y-3">
                <div class="text-center py-10 opacity-30 italic text-sm">Loading database...</div>
            </div>
        </div>
    </div>

    <script>
        // SUPABASE CONNECTION
        const supabaseUrl = 'https://cukkytzxcrgyiyciisle.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1a2t5dHp4Y3JneWl5Y2lpc2xlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5OTU1OTgsImV4cCI6MjA5MTU3MTU5OH0.5xT_ul_eHMHbbRNQKSAcHoTF2zLMrqgc1GXHYOZhD1c';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // SAVE LOGIC
        async function saveToCloud() {
            const title = document.getElementById('vTitle').value;
            let url = document.getElementById('vUrl').value;
            const category = document.getElementById('vCat').value;
            const btn = document.getElementById('saveBtn');

            if(!title || !url) return alert("⚠️ Error: Please provide both a title and a URL.");

            // Convert YouTube Links to Embed Format automatically
            if(url.includes("watch?v=")) {
                const vidId = url.split('v=')[1].split('&')[0];
                url = `https://www.youtube.com/embed/${vidId}`;
            } else if (url.includes("youtu.be/")) {
                const vidId = url.split('be/')[1].split('?')[0];
                url = `https://www.youtube.com/embed/${vidId}`;
            } else if (url.includes("/shorts/")) {
                const vidId = url.split('/shorts/')[1].split('?')[0];
                url = `https://www.youtube.com/embed/${vidId}`;
            }

            btn.innerText = "PUBLISHING...";
            btn.disabled = true;

            const { error } = await _supabase
                .from('site_videos')
                .insert([{ title, url, category }]);

            if (error) {
                alert("❌ Database Error: " + error.message);
                btn.innerText = "PUBLISH TO SITE";
                btn.disabled = false;
            } else {
                // Success
                document.getElementById('vTitle').value = "";
                document.getElementById('vUrl').value = "";
                btn.innerText = "SUCCESS!";
                setTimeout(() => {
                    btn.innerText = "PUBLISH TO SITE";
                    btn.disabled = false;
                }, 2000);
                renderList();
            }
        }

        // LOAD LOGIC
        async function renderList() {
            const { data: videos, error } = await _supabase
                .from('site_videos')
                .select('*')
                .order('created_at', { ascending: false });

            const list = document.getElementById('videoList');
            const countLabel = document.getElementById('totalCount');

            if (error) {
                list.innerHTML = `<p class="text-red-500 text-center text-xs">Failed to connect to Supabase. Check RLS policies.</p>`;
                return;
            }

            countLabel.innerText = `${videos.length} Videos`;

            if (videos.length === 0) {
                list.innerHTML = `<p class="text-slate-600 text-center py-10 italic text-sm">The database is empty. Add your first video above!</p>`;
                return;
            }

            list.innerHTML = videos.map(v => `
                <div class="flex justify-between items-center bg-slate-900/40 p-4 rounded-2xl border border-slate-800 hover:border-slate-700 transition-all group">
                    <div>
                        <p class="font-bold text-sm text-white group-hover:text-yellow-500 transition-colors">${v.title}</p>
                        <div class="flex items-center space-x-3 mt-1">
                            <span class="text-[9px] uppercase px-2 py-0.5 bg-slate-800 text-yellow-500 font-black rounded-md tracking-widest">${v.category}</span>
                            <span class="text-[9px] text-slate-600 font-bold uppercase">${new Date(v.created_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <button onclick="deleteVid(${v.id})" class="text-[10px] text-slate-500 hover:text-red-500 font-black uppercase tracking-widest transition-colors">Delete</button>
                </div>
            `).join('');
        }

        // DELETE LOGIC
        async function deleteVid(id) {
            if(confirm("Are you sure you want to remove this video from the live site?")) {
                const { error } = await _supabase
                    .from('site_videos')
                    .delete()
                    .eq('id', id);
                
                if(error) alert("Error deleting: " + error.message);
                else renderList();
            }
        }

        // Page Load Init
        window.onload = function() {
            renderList();
            // Sync theme if set
            const color = localStorage.getItem('themeColor') || '#eab308';
            document.documentElement.style.setProperty('--accent-color', color);
        };
    </script>
</body>
</html>
