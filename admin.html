<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN | REBA RWANDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent-color: #eab308; }
        body { background-color: #0f172a; color: #f8fafc; }
        .admin-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.5rem; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black italic">VIDEO <span class="text-yellow-500">MANAGER</span></h1>
            <a href="index.html" class="bg-slate-800 px-6 py-2 rounded-full text-xs font-bold hover:bg-slate-700 uppercase">View Site</a>
        </div>

        <div class="admin-card p-6 mb-8">
            <h2 class="text-sm font-black uppercase mb-4 text-yellow-500">Add Live URL</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="vTitle" placeholder="Video Title" class="bg-slate-900 border border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-500">
                <input type="text" id="vUrl" placeholder="YouTube URL" class="bg-slate-900 border border-slate-700 p-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-yellow-500">
                <select id="vCat" class="bg-slate-900 border border-slate-700 p-3 rounded-xl">
                    <option value="livefeed">Live Feed</option>
                    <option value="highlights">Highlights</option>
                    <option value="trainings">Trainings</option>
                    <option value="shorts">Shorts</option>
                </select>
                <button onclick="saveToCloud()" class="bg-yellow-500 text-blue-900 font-black rounded-xl uppercase text-xs hover:bg-yellow-400">Save to Cloud</button>
            </div>
        </div>

        <div class="admin-card p-6">
            <h2 class="text-sm font-black uppercase mb-4 text-slate-400">Cloud Registry</h2>
            <div id="videoList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://cukkytzxcrgyiyciisle.supabase.co', 'sb_publishable_z9QuZbH-vdV6CATzC7vLLQ_GlafP1yd');

        async function saveToCloud() {
            const title = document.getElementById('vTitle').value;
            let url = document.getElementById('vUrl').value;
            const category = document.getElementById('vCat').value;

            if(!title || !url) return alert("Fill all fields");

            if(url.includes("watch?v=")) url = "https://www.youtube.com/embed/" + url.split('v=')[1].split('&')[0];
            else if(url.includes("youtu.be/")) url = "https://www.youtube.com/embed/" + url.split('be/')[1].split('?')[0];

            const { error } = await _supabase.from('site_videos').insert([{ title, url, category }]);
            if (error) alert(error.message);
            else { location.reload(); }
        }

        async function renderList() {
            const { data: videos } = await _supabase.from('site_videos').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('videoList');
            if (videos) {
                list.innerHTML = videos.map(v => `
                    <div class="flex justify-between items-center bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                        <div><p class="font-bold text-sm">${v.title}</p><p class="text-[10px] uppercase text-yellow-500 font-black">${v.category}</p></div>
                        <button onclick="deleteVid(${v.id})" class="text-xs text-red-500 font-bold uppercase hover:underline">Delete</button>
                    </div>
                `).join('');
            }
        }

        async function deleteVid(id) {
            if(confirm("Remove this video?")) {
                await _supabase.from('site_videos').delete().eq('id', id);
                renderList();
            }
        }
        window.onload = renderList;
    </script>
</body>
</html>
