<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE FEED | REBA RWANDA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent-color: #eab308; }
        body { background-color: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 1.5rem; background: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; pointer-events: none; }
        #videoOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .expanded-container { width: 90%; max-width: 1000px; aspect-ratio: 16/9; border: 2px solid var(--accent-color); border-radius: 2rem; overflow: hidden; }
        .theme-accent-bg { background-color: var(--accent-color); }
        .theme-accent-border { border-color: var(--accent-color); }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <div id="videoOverlay" onclick="closeVideo()">
        <button class="absolute top-8 right-8 text-white text-3xl font-bold">&times;</button>
        <div class="expanded-container" onclick="event.stopPropagation()">
            <iframe id="expandedIframe" class="w-full h-full" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <header id="mainHeader" class="bg-blue-900 border-b-4 border-yellow-500 sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center space-x-3">
                <img src="https://rebarwandapl.vercel.app/icon.jpeg" class="h-10 w-10 rounded-full border-2 theme-accent-border">
                <h1 class="text-xl font-black italic text-white">REBA RWANDA</h1>
            </a>
            <div class="flex items-center space-x-3">
                <p id="displayUserName" class="text-white font-black text-xs uppercase">Nestor</p>
                <div id="userInitials" class="h-8 w-8 theme-accent-bg rounded-full flex items-center justify-center text-blue-900 font-bold">N</div>
            </div>
        </div>
    </header>

    <div class="flex flex-1 container mx-auto">
        <aside class="w-64 p-6 border-r border-slate-800 space-y-2 hidden lg:block">
            <a href="index.html" class="block p-3 hover:bg-slate-800 rounded-xl transition-all">🏠 Home</a>
            <a href="livefeed.html" class="block p-3 theme-accent-bg text-blue-900 font-bold rounded-xl">🔴 Live Feed</a>
            <a href="highlights.html" class="block p-3 hover:bg-slate-800 rounded-xl">🏆 Highlights</a>
            <a href="trainings.html" class="block p-3 hover:bg-slate-800 rounded-xl">⚽ Trainings</a>
            <a href="shorts.html" class="block p-3 hover:bg-slate-800 rounded-xl">📱 Shorts</a>
            <a href="settings.html" class="block p-3 hover:bg-slate-800 rounded-xl">⚙️ Settings</a>
        </aside>

        <main class="flex-1 p-8">
            <div class="flex items-center space-x-3 mb-8">
                <div class="h-3 w-3 bg-red-600 rounded-full animate-pulse"></div>
                <h2 class="text-2xl font-black uppercase italic tracking-tighter">Live Matches</h2>
            </div>
            <div id="videoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </main>
    </div>

    <script>
        const _supabase = supabase.createClient('https://cukkytzxcrgyiyciisle.supabase.co', 'sb_publishable_z9QuZbH-vdV6CATzC7vLLQ_GlafP1yd');
        
        async function fetchLiveVideos() {
            const { data: videos } = await _supabase.from('site_videos').select('*').eq('category', 'livefeed').order('created_at', { ascending: false });
            const grid = document.getElementById('videoGrid');
            if(videos && videos.length > 0) {
                grid.innerHTML = videos.map(v => `
                    <div class="bg-slate-800/50 p-4 rounded-3xl border border-slate-700 cursor-pointer hover:border-yellow-500 transition-all group" onclick="openVideo('${v.url}')">
                        <div class="video-wrapper mb-4"><iframe src="${v.url}"></iframe></div>
                        <h4 class="font-bold text-sm group-hover:text-yellow-500 transition-colors">${v.title}</h4>
                        <p class="text-[10px] text-red-500 font-black uppercase mt-1">Live Now</p>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = `<p class="text-slate-500 italic col-span-full text-center py-10">No live streams available at the moment.</p>`;
            }
        }

        function openVideo(url) {
            document.getElementById('expandedIframe').src = url + "?autoplay=1&rel=0";
            document.getElementById('videoOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            document.getElementById('expandedIframe').src = "";
            document.getElementById('videoOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onload = function() {
            fetchLiveVideos();
            const name = localStorage.getItem('userName') || 'Nestor';
            const color = localStorage.getItem('themeColor') || '#eab308';
            document.getElementById('displayUserName').innerText = name;
            document.getElementById('userInitials').innerText = name.charAt(0).toUpperCase();
            document.documentElement.style.setProperty('--accent-color', color);
            document.getElementById('mainHeader').style.borderColor = color;
        };
    </script>
</body>
</html>
